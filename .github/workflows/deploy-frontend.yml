name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
  workflow_run:
    workflows: [Deploy Infrastructure]
    branches: [main]
    types: [completed]

permissions:
  id-token: write
  contents: read
  pages: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Retrieve WebSocket URL from CloudFormation
        id: cdk
        run: |
          SIGNALING_URL=$(aws cloudformation describe-stacks \
            --stack-name TictactoeSignalingStack \
            --query "Stacks[0].Outputs[?OutputKey=='WebSocketUrl'].OutputValue" \
            --output text)
          echo "signaling_url=${SIGNALING_URL}" >> $GITHUB_OUTPUT

      - name: Retrieve connect secret from Secrets Manager
        id: secret
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id tictactoe/connect-secret \
            --query SecretString \
            --output text)
          echo "connect_secret=${SECRET}" >> $GITHUB_OUTPUT

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build client
        working-directory: client
        env:
          VITE_SIGNALING_URL: ${{ steps.cdk.outputs.signaling_url }}
          VITE_CONNECT_SECRET: ${{ steps.secret.outputs.connect_secret }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
